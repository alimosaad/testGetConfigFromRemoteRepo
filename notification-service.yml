spring:
  mongodb:
    username: alimosaad
    password: alimosaad
    host: localhost
    port: 27017
    authentication-database: admin
    database: customer
  kafka:
    consumer:
      bootstrap-servers: localhost:9092
      group-id: paymentGroup,orderGroup
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: '*'
        spring.json.type.mapping: orderConfirmation:com.alimosaad.order.kafka.OrderConfirmation,paymentConfirmation:com.alimosaad.payment.notification.PaymentNotificationRequest
  mail:
    host: localhost
    port: 1025
    username: alimosaad
    password: alimosaad
    properties:
      mail:
        stamp: "*"
      auth: true
      starttls: true
      connectionTimeOut: 5000
      timeOut: 3000
      writeTimeOut: 5000
server:
  port: 8040
